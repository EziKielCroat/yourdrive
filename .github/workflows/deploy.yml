# Runs on your Raspberry Pi (self-hosted runner). On each push to main, pulls the repo,
# installs deps, migrates DB, builds, restarts the API. Change the cd path if your app is not in /opt/yourdrive.

name: Deploy to Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          cd /opt/yourdrive
          git fetch origin
          git reset --hard origin/main
          # --include=optional: Rollup/Vite need platform-specific @rollup/* binaries on ARM.
          # apps/web lists @rollup/rollup-linux-arm64-gnu as optionalDependency (skipped on Windows dev; installed on Pi).
          # Fallback covers npm optional-deps bugs (https://github.com/npm/cli/issues/4828).
          npm install --include=optional
          if [ ! -d node_modules/@rollup/rollup-linux-arm64-gnu ]; then
            ROLLUP_VER=$(node -p "require('./node_modules/rollup/package.json').version")
            npm install "@rollup/rollup-linux-arm64-gnu@${ROLLUP_VER}" -w web
          fi
          npm run db:generate
          (cd apps/api && npx prisma migrate deploy)
          npm run build
          pm2 restart yourdrive-api || pm2 start apps/api/dist/index.js --name yourdrive-api
          pm2 save
